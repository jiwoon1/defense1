<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Castle Defense</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#121a33;
      --line:#253057;
      --text:#e9ecff;
      --muted:#aab1d8;
      --good:#5ef0a2;
      --warn:#ffd166;
      --bad:#ff5c7a;
    }
    body{margin:0;background:linear-gradient(180deg,#070a14,var(--bg));color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;}
    .wrap{max-width:1100px;margin:0 auto;padding:18px;}
    h1{font-size:18px;margin:0 0 10px 0;color:#ffffff;opacity:.92}
    .grid{display:grid;grid-template-columns: 1fr 320px;gap:14px;align-items:start;}
    canvas{width:100%;height:560px;background:radial-gradient(circle at 20% 40%,#14204a 0%,#0a0f22 60%,#070a14 100%);border:1px solid var(--line);border-radius:12px;}
    .panel{background:rgba(18,26,51,.9);border:1px solid var(--line);border-radius:12px;padding:12px;position:sticky;top:12px}
    .row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:8px 0;}
    .stat{color:var(--muted);font-size:12px}
    .money{font-weight:700;color:var(--warn)}
    button{width:100%;padding:10px 10px;border-radius:10px;border:1px solid #2e3a6b;background:#17214a;color:var(--text);font-weight:650;cursor:pointer}
    button:hover{filter:brightness(1.08)}
    button:disabled{opacity:.5;cursor:not-allowed}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .small{font-size:12px;color:var(--muted);line-height:1.4}
    .kbd{display:inline-block;border:1px solid #33407a;background:#0d1330;border-radius:6px;padding:2px 6px;font-size:12px;color:#cdd3ff}
    .bar{height:10px;background:#0b0f24;border:1px solid #2b3563;border-radius:999px;overflow:hidden}
    .bar > div{height:100%;background:linear-gradient(90deg,var(--good),#4cc9f0)}
    .danger > div{background:linear-gradient(90deg,#ff5c7a,#ffa6b7)}
    .sep{height:1px;background:var(--line);margin:10px 0}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Castle Defense (왼쪽 성 / 오른쪽 적) — 병사·대포 업그레이드 디펜스</h1>
  <div class="grid">
    <canvas id="c" width="960" height="560" aria-label="game"></canvas>
    <div class="panel">
      <div class="row"><div class="stat">라운드</div><div id="wave" style="font-weight:700">1</div></div>
      <div class="row"><div class="stat">골드</div><div class="money" id="gold">0</div></div>
      <div class="row"><div class="stat">성 체력</div><div style="width:160px"><div class="bar danger"><div id="castleHpBar" style="width:100%"></div></div></div></div>

      <div class="sep"></div>

      <div class="row"><div style="font-weight:700">병사</div><div class="stat">근접/자동 생성</div></div>
      <div class="row"><div class="stat">레벨</div><div id="soldierLv" style="font-weight:700">1</div></div>
      <div class="row"><div class="stat">초당 생성</div><div id="spawnRate" style="font-weight:700">0.60</div></div>
      <div class="row"><div class="stat">공격력</div><div id="soldierDmg" style="font-weight:700">7</div></div>
      <button id="upSoldier">병사 업그레이드 (비용: <span id="costSoldier">40</span>)</button>

      <div class="sep"></div>

      <div class="row"><div style="font-weight:700">대포</div><div class="stat">원거리/광역</div></div>
      <div class="row"><div class="stat">레벨</div><div id="cannonLv" style="font-weight:700">1</div></div>
      <div class="row"><div class="stat">재장전(초)</div><div id="cannonCd" style="font-weight:700">1.60</div></div>
      <div class="row"><div class="stat">피해</div><div id="cannonDmg" style="font-weight:700">24</div></div>
      <button id="upCannon">대포 업그레이드 (비용: <span id="costCannon">60</span>)</button>

      <div class="sep"></div>

      <div class="btns">
        <button id="start">시작 / 재시작</button>
        <button id="pause">일시정지</button>
      </div>
      <p class="small" style="margin-top:10px">
        조작: <span class="kbd">클릭</span>으로 병사 소환(소량 골드 소비) / <span class="kbd">Space</span> 대포 수동 발사 / <span class="kbd">P</span> 일시정지
      </p>
      <p class="small">
        팁: 초반엔 병사 업그레이드로 라인을 세우고, 중후반엔 대포 업그레이드로 뭉친 적을 정리하세요.
      </p>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // UI
  const ui = {
    wave: document.getElementById('wave'),
    gold: document.getElementById('gold'),
    castleHpBar: document.getElementById('castleHpBar'),
    soldierLv: document.getElementById('soldierLv'),
    cannonLv: document.getElementById('cannonLv'),
    spawnRate: document.getElementById('spawnRate'),
    soldierDmg: document.getElementById('soldierDmg'),
    cannonCd: document.getElementById('cannonCd'),
    cannonDmg: document.getElementById('cannonDmg'),
    costSoldier: document.getElementById('costSoldier'),
    costCannon: document.getElementById('costCannon'),
    upSoldier: document.getElementById('upSoldier'),
    upCannon: document.getElementById('upCannon'),
    start: document.getElementById('start'),
    pause: document.getElementById('pause'),
  };

  const W = () => canvas.width;
  const H = () => canvas.height;

  const rand = (a,b)=>a+Math.random()*(b-a);

  let raf = null;
  let last = 0;

  // Game state
  const state = {
    running: false,
    paused: false,
    time: 0,
    wave: 1,
    gold: 80,
    castle: {
      x: 90,
      y: H()*0.5,
      r: 42,
      hp: 260,
      hpMax: 260,
    },
    laneY: H()*0.5,
    soldiers: [],
    enemies: [],
    bullets: [],
    explosions: [],

    soldier: {
      lv: 1,
      dmg: 7,
      hp: 44,
      spd: 72,
      costClick: 8,
      autoSpawnPerSec: 0.60,
      autoTimer: 0,
      upgradeCost: 40,
    },

    cannon: {
      lv: 1,
      dmg: 24,
      radius: 42,
      cooldown: 1.60,
      timer: 0,
      upgradeCost: 60,
    },

    enemy: {
      baseHp: 36,
      baseSpd: 48,
      baseGold: 10,
      spawn: {
        perSec: 0.7,
        timer: 0,
      }
    },

    waveTimer: 0,
    waveDuration: 20,
  };

  function reset() {
    state.running = true;
    state.paused = false;
    state.time = 0;
    state.wave = 1;
    state.gold = 80;

    state.castle.hpMax = 260;
    state.castle.hp = state.castle.hpMax;

    state.soldiers = [];
    state.enemies = [];
    state.bullets = [];
    state.explosions = [];

    state.soldier.lv = 1;
    state.soldier.dmg = 7;
    state.soldier.hp = 44;
    state.soldier.spd = 72;
    state.soldier.autoSpawnPerSec = 0.60;
    state.soldier.autoTimer = 0;
    state.soldier.upgradeCost = 40;

    state.cannon.lv = 1;
    state.cannon.dmg = 24;
    state.cannon.radius = 42;
    state.cannon.cooldown = 1.60;
    state.cannon.timer = 0;
    state.cannon.upgradeCost = 60;

    state.enemy.baseHp = 36;
    state.enemy.baseSpd = 48;
    state.enemy.baseGold = 10;
    state.enemy.spawn.perSec = 0.7;
    state.enemy.spawn.timer = 0;

    state.waveTimer = 0;
    state.waveDuration = 20;

    updateUI();
  }

  function updateUI() {
    ui.wave.textContent = state.wave;
    ui.gold.textContent = Math.floor(state.gold);

    ui.soldierLv.textContent = state.soldier.lv;
    ui.cannonLv.textContent = state.cannon.lv;

    ui.spawnRate.textContent = state.soldier.autoSpawnPerSec.toFixed(2);
    ui.soldierDmg.textContent = Math.floor(state.soldier.dmg);

    ui.cannonCd.textContent = state.cannon.cooldown.toFixed(2);
    ui.cannonDmg.textContent = Math.floor(state.cannon.dmg);

    ui.costSoldier.textContent = Math.floor(state.soldier.upgradeCost);
    ui.costCannon.textContent = Math.floor(state.cannon.upgradeCost);

    const hpPct = Math.max(0, state.castle.hp / state.castle.hpMax);
    ui.castleHpBar.style.width = (hpPct*100).toFixed(1) + '%';

    ui.upSoldier.disabled = state.gold < state.soldier.upgradeCost || !state.running;
    ui.upCannon.disabled = state.gold < state.cannon.upgradeCost || !state.running;
  }

  function spawnEnemy() {
    const y = state.laneY + rand(-70, 70);
    const scale = 1 + (state.wave-1)*0.06;
    const hp = (state.enemy.baseHp * scale) * rand(0.92,1.12);
    const spd = (state.enemy.baseSpd * (1 + (state.wave-1)*0.02)) * rand(0.92,1.08);
    const gold = Math.round(state.enemy.baseGold * (1 + (state.wave-1)*0.04));
    state.enemies.push({
      x: W() + 30,
      y,
      r: 16,
      hp,
      hpMax: hp,
      spd,
      atk: 12 + (state.wave-1)*1.2,
      gold,
      hitFlash: 0,
    });
  }

  function spawnSoldier() {
    state.soldiers.push({
      x: state.castle.x + state.castle.r + 12,
      y: state.laneY + rand(-60,60),
      r: 13,
      hp: state.soldier.hp,
      hpMax: state.soldier.hp,
      spd: state.soldier.spd,
      dmg: state.soldier.dmg,
      cd: 0,
      cdMax: 0.55,
      hitFlash: 0,
    });
  }

  function fireCannon(targetX, targetY) {
    if (state.cannon.timer > 0) return;
    state.cannon.timer = state.cannon.cooldown;
    const fromX = state.castle.x + 10;
    const fromY = state.castle.y - 30;
    const dx = targetX - fromX;
    const dy = targetY - fromY;
    const len = Math.hypot(dx,dy) || 1;
    const v = 520;
    state.bullets.push({
      x: fromX,
      y: fromY,
      vx: dx/len * v,
      vy: dy/len * v,
      r: 5,
      dmg: state.cannon.dmg,
      radius: state.cannon.radius,
      life: 2.2,
    });
  }

  function explode(x,y, radius, dmg) {
    state.explosions.push({x,y,r:0, rMax:radius, t:0});
    for (const e of state.enemies) {
      const d = Math.hypot(e.x-x, e.y-y);
      if (d <= radius) {
        const falloff = 1 - (d/radius);
        e.hp -= dmg * (0.55 + 0.45*falloff);
        e.hitFlash = 0.12;
      }
    }
  }

  function upgradeSoldier() {
    if (state.gold < state.soldier.upgradeCost) return;
    state.gold -= state.soldier.upgradeCost;
    state.soldier.lv += 1;
    state.soldier.dmg = Math.round(state.soldier.dmg * 1.18 + 2);
    state.soldier.hp = Math.round(state.soldier.hp * 1.16 + 4);
    state.soldier.spd = Math.min(120, state.soldier.spd + 4);
    state.soldier.autoSpawnPerSec = Math.min(2.4, state.soldier.autoSpawnPerSec + 0.12);
    state.soldier.upgradeCost = Math.round(state.soldier.upgradeCost * 1.45 + 10);
    updateUI();
  }

  function upgradeCannon() {
    if (state.gold < state.cannon.upgradeCost) return;
    state.gold -= state.cannon.upgradeCost;
    state.cannon.lv += 1;
    state.cannon.dmg = Math.round(state.cannon.dmg * 1.25 + 6);
    state.cannon.radius = Math.min(92, state.cannon.radius + 5);
    state.cannon.cooldown = Math.max(0.55, state.cannon.cooldown * 0.92);
    state.cannon.upgradeCost = Math.round(state.cannon.upgradeCost * 1.55 + 14);
    updateUI();
  }

  function tick(dt) {
    if (!state.running || state.paused) return;
    state.time += dt;

    // wave progress
    state.waveTimer += dt;
    if (state.waveTimer >= state.waveDuration) {
      state.wave += 1;
      state.waveTimer = 0;
      // slightly ramp spawn
      state.enemy.spawn.perSec = Math.min(2.4, state.enemy.spawn.perSec + 0.12);
      // small gold bonus
      state.gold += 25 + state.wave * 3;
      updateUI();
    }

    // auto spawn soldiers
    state.soldier.autoTimer += dt;
    const per = 1 / state.soldier.autoSpawnPerSec;
    while (state.soldier.autoTimer >= per) {
      state.soldier.autoTimer -= per;
      spawnSoldier();
    }

    // spawn enemies
    state.enemy.spawn.timer += dt;
    const perE = 1 / state.enemy.spawn.perSec;
    while (state.enemy.spawn.timer >= perE) {
      state.enemy.spawn.timer -= perE;
      spawnEnemy();
    }

    // cannon cooldown
    state.cannon.timer = Math.max(0, state.cannon.timer - dt);

    // bullets
    for (let i = state.bullets.length-1; i>=0; i--) {
      const b = state.bullets[i];
      b.life -= dt;
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      // hit ground/right side
      if (b.life <= 0 || b.x > W()+40 || b.y < -40 || b.y > H()+40) {
        state.bullets.splice(i,1);
        continue;
      }
      // collide with any enemy
      let hit = false;
      for (const e of state.enemies) {
        if (Math.hypot(e.x-b.x, e.y-b.y) <= e.r + b.r) { hit = true; break; }
      }
      if (hit) {
        explode(b.x,b.y,b.radius,b.dmg);
        state.bullets.splice(i,1);
      }
    }

    // explosions
    for (let i = state.explosions.length-1; i>=0; i--) {
      const ex = state.explosions[i];
      ex.t += dt;
      ex.r = Math.min(ex.rMax, ex.rMax * (1 - Math.exp(-7*ex.t)));
      if (ex.t > 0.35) state.explosions.splice(i,1);
    }

    // soldiers vs enemies
    for (const s of state.soldiers) {
      s.hitFlash = Math.max(0, s.hitFlash - dt);
      s.cd = Math.max(0, s.cd - dt);
      // move forward
      s.x += s.spd * dt;

      // find nearest enemy in front within range
      let target = null;
      let best = 1e9;
      for (const e of state.enemies) {
        const dx = e.x - s.x;
        const dy = e.y - s.y;
        const d = Math.hypot(dx,dy);
        if (dx > -10 && d < 34 && d < best) { best = d; target = e; }
      }
      if (target && s.cd === 0) {
        target.hp -= s.dmg;
        target.hitFlash = 0.10;
        s.cd = s.cdMax;
      }
    }

    // enemies move & attack castle/soldiers
    for (const e of state.enemies) {
      e.hitFlash = Math.max(0, e.hitFlash - dt);

      // collide with soldier?
      let blocking = null;
      let best = 1e9;
      for (const s of state.soldiers) {
        const d = Math.hypot(e.x - s.x, e.y - s.y);
        if (d <= e.r + s.r + 2 && d < best) { best = d; blocking = s; }
      }

      if (blocking) {
        // attack soldier
        blocking.hp -= e.atk * dt;
        blocking.hitFlash = 0.10;
        e.x -= e.spd * dt * 0.15; // slight pushback
      } else {
        e.x -= e.spd * dt;
      }

      // reach castle
      const dCastle = Math.hypot(e.x - state.castle.x, e.y - state.castle.y);
      if (dCastle <= e.r + state.castle.r) {
        state.castle.hp -= e.atk * dt;
      }
    }

    // cleanup dead soldiers
    for (let i = state.soldiers.length-1; i>=0; i--) {
      const s = state.soldiers[i];
      if (s.hp <= 0 || s.x > W()+30) state.soldiers.splice(i,1);
    }

    // cleanup dead enemies & reward
    for (let i = state.enemies.length-1; i>=0; i--) {
      const e = state.enemies[i];
      if (e.hp <= 0) {
        state.gold += e.gold;
        state.enemies.splice(i,1);
        updateUI();
      }
    }

    // game over
    if (state.castle.hp <= 0) {
      state.castle.hp = 0;
      state.running = false;
      updateUI();
      cancelAnimationFrame(raf);
      raf = null;
    }

    updateUI();
  }

  function draw() {
    // background
    ctx.clearRect(0,0,W(),H());

    // ground line
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#6c7cff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, state.laneY);
    ctx.lineTo(W(), state.laneY);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // castle
    const c = state.castle;
    ctx.save();
    ctx.translate(c.x,c.y);
    // moat
    ctx.fillStyle = 'rgba(76,201,240,0.08)';
    ctx.beginPath();
    ctx.arc(0,0,c.r+18,0,Math.PI*2);
    ctx.fill();
    // body
    ctx.fillStyle = '#d7dbff';
    ctx.beginPath();
    ctx.arc(0,0,c.r,0,Math.PI*2);
    ctx.fill();
    // door
    ctx.fillStyle = '#1b244a';
    ctx.fillRect(-10, 10, 20, 26);
    // battlement
    ctx.fillStyle = '#b7beff';
    for (let i=-22;i<=22;i+=11){ ctx.fillRect(i-4,-c.r-8,8,14); }
    ctx.restore();

    // cannon on top
    ctx.save();
    ctx.translate(c.x+12, c.y-44);
    ctx.fillStyle = '#9aa6ff';
    ctx.fillRect(-10, -6, 44, 12);
    ctx.fillStyle = '#5560b9';
    ctx.fillRect(-14, -10, 10, 20);
    ctx.restore();

    // soldiers
    for (const s of state.soldiers) {
      ctx.save();
      ctx.translate(s.x,s.y);
      ctx.fillStyle = s.hitFlash>0 ? '#ffffff' : '#5ef0a2';
      ctx.beginPath();
      ctx.arc(0,0,s.r,0,Math.PI*2);
      ctx.fill();
      // hp bar
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = '#0b0f24';
      ctx.fillRect(-16, -24, 32, 5);
      ctx.fillStyle = '#5ef0a2';
      ctx.fillRect(-16, -24, 32*(Math.max(0,s.hp)/s.hpMax), 5);
      ctx.restore();
    }

    // enemies
    for (const e of state.enemies) {
      ctx.save();
      ctx.translate(e.x,e.y);
      ctx.fillStyle = e.hitFlash>0 ? '#ffffff' : '#ff5c7a';
      ctx.beginPath();
      ctx.arc(0,0,e.r,0,Math.PI*2);
      ctx.fill();
      // horn
      ctx.fillStyle = '#ff9db0';
      ctx.beginPath();
      ctx.moveTo(-4,-e.r);
      ctx.lineTo(-18,-e.r-10);
      ctx.lineTo(-8,-e.r+2);
      ctx.closePath();
      ctx.fill();
      // hp
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = '#0b0f24';
      ctx.fillRect(-18, -26, 36, 5);
      ctx.fillStyle = '#ff5c7a';
      ctx.fillRect(-18, -26, 36*(Math.max(0,e.hp)/e.hpMax), 5);
      ctx.restore();
    }

    // bullets
    for (const b of state.bullets) {
      ctx.save();
      ctx.translate(b.x,b.y);
      ctx.fillStyle = '#ffd166';
      ctx.beginPath();
      ctx.arc(0,0,b.r,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // explosions
    for (const ex of state.explosions) {
      ctx.save();
      ctx.translate(ex.x,ex.y);
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = '#ffd166';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0,0,ex.r,0,Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#ff5c7a';
      ctx.beginPath();
      ctx.arc(0,0,ex.r*0.7,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // overlay
    if (!state.running) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0,0,W(),H());
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 34px system-ui';
      ctx.fillText('GAME OVER', W()/2 - 110, H()/2 - 10);
      ctx.font = '500 16px system-ui';
      ctx.fillText('오른쪽 적에게 성이 무너졌습니다. “시작/재시작”을 눌러 다시 시작하세요.', W()/2 - 260, H()/2 + 24);
      ctx.restore();
    }

    if (state.paused && state.running) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(0,0,W(),H());
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 28px system-ui';
      ctx.fillText('PAUSED', W()/2 - 70, H()/2);
      ctx.restore();
    }
  }

  function loop(ts) {
    if (!last) last = ts;
    const dt = Math.min(0.033, (ts - last) / 1000);
    last = ts;

    tick(dt);
    draw();

    raf = requestAnimationFrame(loop);
  }

  // Inputs
  canvas.addEventListener('click', (ev) => {
    if (!state.running) return;
    const rect = canvas.getBoundingClientRect();
    const x = (ev.clientX - rect.left) * (canvas.width / rect.width);
    const y = (ev.clientY - rect.top) * (canvas.height / rect.height);

    // Shift-click = cannon shot
    if (ev.shiftKey) {
      fireCannon(x,y);
      return;
    }

    // Normal click = buy 1 soldier if gold
    if (state.gold >= state.soldier.costClick) {
      state.gold -= state.soldier.costClick;
      spawnSoldier();
      updateUI();
    }
  });

  window.addEventListener('keydown', (ev) => {
    if (ev.code === 'Space') {
      ev.preventDefault();
      // fire to nearest cluster (simple)
      if (state.enemies.length) {
        const target = state.enemies.reduce((a,b)=> (b.x<a.x?b:a)); // closest to castle
        fireCannon(target.x, target.y);
      } else {
        fireCannon(W()*0.75, state.laneY);
      }
    }
    if (ev.key.toLowerCase() === 'p') {
      togglePause();
    }
  });

  function togglePause(){
    if (!state.running) return;
    state.paused = !state.paused;
    ui.pause.textContent = state.paused ? '재개' : '일시정지';
  }

  ui.upSoldier.addEventListener('click', upgradeSoldier);
  ui.upCannon.addEventListener('click', upgradeCannon);
  ui.start.addEventListener('click', () => {
    reset();
    if (!raf) {
      last = 0;
      raf = requestAnimationFrame(loop);
    }
    ui.pause.textContent = '일시정지';
  });
  ui.pause.addEventListener('click', () => {
    togglePause();
  });

  // Initial render
  reset();
  last = 0;
  if (!raf) raf = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
